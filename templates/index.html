<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BigQuery Release Notes</title>
    <meta name="description" content="A simple BigQuery release notes viewer with refresh and X/Twitter sharing.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">Google Cloud</p>
                <h1>BigQuery Release Notes</h1>
                <p class="subtitle">Latest updates from the official BigQuery release notes feed.</p>
            </div>

            <div class="header-actions">
                <label class="theme-toggle" for="theme-toggle">
                    <span id="theme-toggle-label">Theme: Dark</span>
                    <input id="theme-toggle" type="checkbox" role="switch" aria-label="Switch color theme">
                    <span class="toggle-track" aria-hidden="true"></span>
                </label>

                <button id="refresh-button" class="refresh-button" type="button">
                    <span class="spinner" aria-hidden="true"></span>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <section class="status-row" aria-live="polite">
            <span id="status-message">Loading release notes...</span>
            <span id="last-updated"></span>
        </section>

        <main id="release-list" class="release-list" aria-label="BigQuery release notes"></main>
    </div>

    <dialog id="tweet-dialog" class="tweet-dialog">
        <form method="dialog">
            <div class="dialog-header">
                <h2>Tweet This Update</h2>
                <button id="close-dialog" class="icon-button" type="button" aria-label="Close dialog">x</button>
            </div>

            <label for="tweet-text">Tweet text</label>
            <textarea id="tweet-text" rows="7"></textarea>

            <div class="dialog-footer">
                <span id="tweet-count">0 / 280</span>
                <div class="dialog-actions">
                    <button id="cancel-tweet" class="secondary-button" type="button">Cancel</button>
                    <button id="post-tweet" class="primary-button" type="button">Post on X</button>
                </div>
            </div>
        </form>
    </dialog>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
